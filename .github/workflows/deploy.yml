name: Deploy to Ubuntu server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH (password auth)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          port: ${{ vars.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ vars.DEPLOY_PATH }}"

            echo "==> Pull ultimo commit dal branch main"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Attivo virtualenv"
            source venv/bin/activate

            echo "==> Aggiorno dipendenze"
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "==> Applico migrazioni database"
            python manage.py migrate --noinput

            echo "==> Raccolgo file statici"
            python manage.py collectstatic --noinput

            echo "==> Riavvio gunicorn"
            systemctl restart "${{ vars.SERVICE_NAME }}"

            echo "==> Stato servizio"
            systemctl is-active "${{ vars.SERVICE_NAME }}"
