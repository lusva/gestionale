{% extends 'base.html' %}
{% block content %}
<div class="page" style="max-width: 520px; margin: 40px auto;">
  <div class="card" style="padding: 32px;">
    <h1 style="font: 600 20px var(--font-display); margin: 0 0 8px;">Eliminare «{{ object.titolo }}»?</h1>
    <form method="post" style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;">
      {% csrf_token %}
      <a href="{% url 'attivita:list' %}" class="btn btn-ghost">Annulla</a>
      <button type="submit" class="btn" style="background: var(--danger); color: white;">Elimina</button>
    </form>
  </div>
</div>
{% endblock %}
