{% extends 'base.html' %}

{% block title %}Conferma eliminazione{% endblock %}

{% block content %}
<div class="page" style="max-width: 540px;">
  <div class="card" style="padding: 24px;">
    <h1 style="font: 600 18px var(--font-display); margin: 0 0 4px;">Eliminare {{ object_label|default:object }}?</h1>
    <p style="font: 13px var(--font-body); color: var(--ink-3); margin: 0 0 16px;">
      L'operazione è permanente.
    </p>
    <form method="post" style="display: flex; gap: 8px; justify-content: flex-end;">
      {% csrf_token %}
      <a href="{% url urls.list %}" class="btn btn-ghost">Annulla</a>
      <button type="submit" class="btn" style="background: var(--danger); color: white; border-color: var(--danger);">
        {% icon 'trash' size=14 %} Elimina
      </button>
    </form>
  </div>
</div>
{% endblock %}
